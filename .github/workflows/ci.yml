name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Compile check
        run: python -m compileall app.py api.py load_docs.py wessbot tests scripts
      - name: Unit tests
        run: python -m unittest discover -s tests -v
      - name: Offline evaluation (product routing / follow-up queries)
        run: python scripts/evaluate_answers.py
